# ─── HEALTH ───────────────────────────────────────────────────────────────────

query Health {
  health
}

# ─── AUTH / ME ────────────────────────────────────────────────────────────────

query GetMe {
  me {
    id
    username
    email
    firstName
    lastName
    role
    isBlocked
    createdAt
    createdByAdminId
    createdManagers {
      id
      username
      firstName
      lastName
      role
      isBlocked
    }
    managedBuildings {
      id
      name
      city
    }
  }
}

# ─── USERS ────────────────────────────────────────────────────────────────────

query GetUsers(
  $first: Int
  $after: String
  $where: UserFilterInput
  $order: [UserSortInput!]
) {
  users(first: $first, after: $after, where: $where, order: $order) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        username
        email
        firstName
        lastName
        role
        isBlocked
        createdAt
        updatedAt
        createdByAdminId
        createdManagers {
          id
          username
          firstName
          lastName
          role
          isBlocked
        }
      }
    }
  }
}

# ─── BUILDINGS ────────────────────────────────────────────────────────────────

query GetBuildings(
  $first: Int
  $after: String
  $where: BuildingFilterInput
  $order: [BuildingSortInput!]
) {
  buildings(first: $first, after: $after, where: $where, order: $order) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        name
        address
        city
        adminId
        createdAt
        updatedAt
        admin {
          id
          username
          firstName
          lastName
        }
        entries {
          id
          name
          order
          adminId
        }
        administrators {
          id
          username
          firstName
          lastName
        }
      }
    }
  }
}

query GetBuildingById($id: UUID!) {
  buildingById(id: $id) {
    id
    name
    address
    city
    adminId
    createdAt
    updatedAt
    admin {
      id
      username
      firstName
      lastName
      email
    }
    entries {
      id
      name
      order
      adminId
      createdAt
      tenants {
        id
        name
        unitNumber
        floor
        contactEmail
        contactPhone
        accessKeyNR

      }
    }
    administrators {
      id
      username
      firstName
      lastName
    }
    tenants {
      id
      name
      unitNumber
      floor
      accessKeyNR
    }
  }
}

