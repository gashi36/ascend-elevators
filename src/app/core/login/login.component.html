<body class="bg-white min-h-screen flex flex-col items-center justify-center px-4 mt-4 py-10">
  <!-- Logo -->
  <div class="flex flex-col items-center mt-12 mb-10">
    <div class="w-14 h-14 bg-red-600 rounded-2xl flex items-center justify-center mb-4"
      style="box-shadow:0 8px 24px rgba(220,38,38,0.28)">
      <svg class="w-7 h-7" viewBox="0 0 40 40" fill="none">
        <rect x="6" y="4" width="10" height="32" rx="1" fill="white" fill-opacity="0.95" />
        <rect x="19" y="10" width="10" height="26" rx="1" fill="white" fill-opacity="0.65" />
        <rect x="32" y="16" width="6" height="20" rx="1" fill="white" fill-opacity="0.35" />
        <rect x="2" y="35" width="36" height="2" rx="1" fill="white" fill-opacity="0.5" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">{{ 'login.title' | translate }}</h1>
    <p class="text-sm text-gray-400 mt-1">{{ 'login.subtitle' | translate }}</p>
  </div>

  <!-- Card -->
  <div class="w-full max-w-sm">

    <!-- Heading -->
    <div class="mb-7">
      <h2 class="text-xl font-bold text-gray-900">{{ 'login.welcome' | translate }}</h2>
      <div class="mt-2 w-7 h-0.5 bg-red-600 rounded-full"></div>
      <p class="mt-2.5 text-sm text-gray-400">{{ 'login.description' | translate }}</p>
    </div>

    <div class="w-full max-w-sm" [formGroup]="loginForm">

      <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ 'login.username' |
          translate }}</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
          </span>
          <input type="text" formControlName="username" [placeholder]="'login.usernamePlaceholder' | translate"
            class="w-full pl-11 pr-4 py-3.5 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-xl outline-none placeholder:text-gray-300"
            [class.border-red-500]="usernameControl.touched && usernameControl.invalid" />
        </div>
      </div>

      <div class="space-y-1.5 mt-4">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ 'login.password' |
          translate }}</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </span>
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
            [placeholder]="'login.passwordPlaceholder' | translate"
            class="w-full pl-11 pr-12 py-3.5 text-sm text-gray-900 bg-gray-50 border border-gray-200 rounded-xl outline-none placeholder:text-gray-300"
            [class.border-red-500]="passwordControl.touched && passwordControl.invalid" />

          <span (click)="togglePassword()" class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
            <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </span>
        </div>
      </div>

      <!-- NEW: Remember Me Checkbox -->
      <div class="flex items-center justify-between mt-4">
        <label class="flex items-center cursor-pointer">
          <input type="checkbox" formControlName="rememberMe"
            class="w-4 h-4 text-red-600 bg-gray-50 border-gray-200 rounded focus:ring-red-500 focus:ring-2">
          <span class="ml-2 text-sm text-gray-500">{{ 'login.rememberMe' | translate }}</span>
        </label>
      </div>

      <button *ngIf="!isLoading" (click)="handleLogin()"
        class="w-full flex items-center justify-center gap-2.5 py-4 mt-6 text-sm font-bold text-white bg-red-600 rounded-xl transition-all active:scale-95"
        style="box-shadow:0 4px 20px rgba(220,38,38,0.22)">
        {{ 'login.loginButton' | translate }}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
        </svg>
      </button>

      <button *ngIf="isLoading" disabled
        class="w-full flex items-center justify-center gap-2.5 py-4 mt-6 text-sm font-bold text-white bg-gray-300 rounded-xl cursor-not-allowed">
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
        </svg>
        {{ 'login.loggingIn' | translate }}
      </button>

      <p *ngIf="errorMessage" class="mt-4 text-center text-xs text-red-500 font-medium">
        {{ errorMessage }}
      </p>

    </div>

    <p class="mt-8 text-center text-xs text-gray-300 leading-relaxed">
      {{ 'login.footer' | translate }}
    </p>

  </div>
</body>
