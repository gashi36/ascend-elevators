# ─── MONTHLY DECISIONS ────────────────────────────────────────────────────────

# Full tenant list with their decisions — used for the main dashboard grid
query GetTenantsWithDecisions(
  $first: Int
  $after: String
  $where: TenantFilterInput
  $order: [TenantSortInput!]
) {
  tenantsWithDecisions(
    first: $first
    after: $after
    where: $where
    order: $order
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        name
        unitNumber
        floor
        accessKeyNR
        contactPhone
        buildingId
        buildingEntryId
        building {
          id
          name
          city
        }
        buildingEntry {
          id
          name
        }
        monthlyDecisions {
          id
          year
          month
          status
          notes
          updatedAt
        }
      }
    }
  }
}

# Decisions for one tenant for a specific year — used in tenant detail view
query GetTenantDecisions($tenantId: UUID!, $year: Int) {
  tenantDecisions(tenantId: $tenantId, year: $year) {
    id
    tenantId
    year
    month
    status
    notes
    decisionDate
    decidedByUserId
    updatedAt
  }
}

# Dashboard summary numbers
query GetDecisionStats {
  decisionStats {
    totalTenants
    currentMonth
    currentYear
    pendingCount
    allowedCount
    deniedCount
  }
}
