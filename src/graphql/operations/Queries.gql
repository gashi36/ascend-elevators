}

query GetBuildingEntriesByBuilding(
  $buildingId: UUID!
  $first: Int
  $after: String
) {
  buildingEntriesByBuilding(
    buildingId: $buildingId
    first: $first
    after: $after
  ) {
    totalCount
    edges {
      node {
        id
        name
        order
        buildingId
        adminId
        createdAt
        tenants {
          id
          name
          unitNumber
          floor
          contactPhone
          accessKeyNR
        }
      }
    }
  }
}

query GetBuildingEntryById($id: UUID!) {
  buildingEntryById(id: $id) {
    id
    name
    order
    buildingId
    adminId
    createdAt
    building {
      id
      name
      city
      admin {
        id
        firstName
        lastName
      }
    }
    tenants {
      id
      name
      unitNumber
      floor
      contactEmail
      contactPhone
      accessKeyNR
      monthlyDecisions {
        id
        year
        month
        status
        updatedAt
      }
    }
  }
}

# ─── TENANTS ──────────────────────────────────────────────────────────────────

query GetTenants(
  $first: Int
  $after: String
  $where: TenantFilterInput
  $order: [TenantSortInput!]
) {
  tenants(first: $first, after: $after, where: $where, order: $order) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        name
        unitNumber
        floor
        contactEmail
        contactPhone
        accessKeyNR
        buildingEntryId
        adminId
        createdAt
        updatedAt
        buildingEntry {
          id
          name
        }
      }
    }
  }
}

query GetTenantById($id: UUID!) {
  tenantById(id: $id) {
    id
    name
    unitNumber
    floor
    contactEmail
    contactPhone
    accessKeyNR

    buildingEntryId
    adminId
    createdAt
    updatedAt
    buildingEntry {
      id
      name
      order
    }
    monthlyDecisions {
      id
      year
      month
      status
      decisionDate
      updatedAt
      decidedByUserId
    }
  }
}

query GetTenantHistory($tenantId: UUID!, $first: Int, $after: String) {
  tenantHistory(tenantId: $tenantId, first: $first, after: $after) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        year
        month
        status
        decisionDate
        decidedByUserId
        updatedAt
      }
    }
  }
}

# ─── MONTHLY DECISIONS ────────────────────────────────────────────────────────
query GetTenantsWithDecisions(
  $first: Int
  $after: String
  $where: TenantFilterInput
  $order: [TenantSortInput!]
  $buildingId: UUID
) {
  tenants(
    first: $first
    after: $after
    where: $where
    order: $order
    buildingId: $buildingId
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    edges {
      cursor
      node {
        id
        name
        unitNumber
        floor
        accessKeyNR
        contactPhone
        buildingEntryId
        buildingEntry {
          id
          name
          building {
            id
            name
            city
          }
        }
        monthlyDecisions {
          id
          year
          month
          status
          notes {
            id
            content
            createdBy
            createdByUserId
            createdAt
          }
          updatedAt
        }
      }
    }
  }
}

